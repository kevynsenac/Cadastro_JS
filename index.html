<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
  <script src="script.js" defer></script>
  <title>Formulário Simples</title>
</head>

<body>
  <main class="container">
    <form id="form-cadastro">
      <h1>Faça seu Cadastro</h1>

      <div class="input-group">
        <label for="input-nome">Digite seu nome</label>
        <input id="input-nome" type="text" placeholder="Ex: João Silva" required />
      </div>

      <div class="input-group">
        <label for="input-email">Digite seu E-mail</label>
        <input id="input-email" type="email" placeholder="seu@email.com" required />
      </div>

      <div class="input-group">
        <label for="input-senha">Crie sua Senha</label>
        <input id="input-senha" type="password" placeholder="Digite sua senha" required />
      </div>

      <button id="btn-cadastrar" type="submit">Cadastrar</button>
    </form>
  </main>
</body>

</html>
